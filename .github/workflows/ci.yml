name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Test & Lint
    runs-on: macos-latest
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release')

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache FastEmbed ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.fastembed_cache
          key: fastembed-bge-base-en-v1.5-q-v2
          restore-keys: |
            fastembed-bge-base-en-v1.5-q-

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create sidecar placeholders for Tauri build script
        run: |
          mkdir -p app/binaries
          touch app/binaries/origin-server-aarch64-apple-darwin
          touch app/binaries/origin-mcp-aarch64-apple-darwin
          touch app/binaries/cloudflared-aarch64-apple-darwin

      - name: Check Rust formatting
        run: cargo fmt --check --all

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests (types + server)
        run: cargo test -p origin-types -p origin-server

      - name: Run Rust tests (core)
        run: cargo test -p origin-core

      # Eval benchmarks (#[ignore]) — slow embedding-heavy tests, run on main only.
      - name: Run eval benchmarks
        if: github.ref == 'refs/heads/main'
        run: cargo test -p origin-core --lib eval::token_efficiency -- --ignored

      # Eval harness integration tests (app/tests/eval_harness.rs) need the
      # FastEmbed BGE-Base-EN-v1.5-Q model (~200MB ONNX) which auto-downloads
      # on first run. GitHub Actions macOS runners lack Metal GPU support and
      # the hf-hub crate can't resolve manually seeded cache files.
      #
      # Run eval tests locally:
      #   cargo test -p origin --test eval_harness
      #
      # The model downloads once into ~/.fastembed_cache and is reused.
      - name: Run app unit tests (eval harness runs locally)
        run: cargo test -p origin --lib

      - name: Run frontend tests
        run: pnpm test
