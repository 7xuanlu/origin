name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"

          CARGO_VERSION=$(grep '^version = ' app/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAURI_VERSION=$(node -p "require('./app/tauri.conf.json').version")
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version:         $TAG"
          echo "app/Cargo.toml:      $CARGO_VERSION"
          echo "app/tauri.conf.json: $TAURI_VERSION"
          echo "package.json:        $PKG_VERSION"

          MISMATCH=0
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag $TAG does not match app/Cargo.toml version $CARGO_VERSION"
            MISMATCH=1
          fi
          if [ "$TAG" != "$TAURI_VERSION" ]; then
            echo "ERROR: tag $TAG does not match app/tauri.conf.json version $TAURI_VERSION"
            MISMATCH=1
          fi
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: tag $TAG does not match package.json version $PKG_VERSION"
            MISMATCH=1
          fi

          if [ "$MISMATCH" -eq 1 ]; then
            echo ""
            echo "Fix: run 'bash scripts/bump-version.sh $TAG' and push the updated files before tagging."
            exit 1
          fi

          echo "All versions consistent: $TAG"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build origin-server
        run: cargo build --release -p origin-server --target aarch64-apple-darwin

      - name: Install origin-mcp sidecar
        run: |
          cargo install --git https://github.com/7xuanlu/origin-mcp --root ./tmp-mcp
          mkdir -p app/binaries
          cp tmp-mcp/bin/origin-mcp app/binaries/origin-mcp-aarch64-apple-darwin
          chmod +x app/binaries/origin-mcp-aarch64-apple-darwin

      - name: Download cloudflared sidecar
        run: |
          mkdir -p app/binaries
          curl -fsSL -o /tmp/cloudflared.tgz \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz
          tar -xzf /tmp/cloudflared.tgz -C /tmp
          cp /tmp/cloudflared app/binaries/cloudflared-aarch64-apple-darwin
          chmod 755 app/binaries/cloudflared-aarch64-apple-darwin
          xattr -cr app/binaries/cloudflared-aarch64-apple-darwin

      - name: Copy origin-server sidecar
        run: |
          cp target/aarch64-apple-darwin/release/origin-server app/binaries/origin-server-aarch64-apple-darwin
          chmod +x app/binaries/origin-server-aarch64-apple-darwin

      - name: Smoke test origin-server
        run: ./target/aarch64-apple-darwin/release/origin-server --help

      - name: Import code signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "Certificate imported successfully"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: 'Origin v__VERSION__'
          prerelease: ${{ contains(github.ref_name, '-') }}
          releaseBody: |
            ## Install

            **Desktop app (macOS Apple Silicon):**
            Download the `.dmg` file below, open it, drag to Applications.
            Then run: `xattr -cr /Applications/Origin.app`

            **MCP integration (latest stable channel):**
            ```
            npx -y origin-mcp
            ```

            **Exact release on this page:**
            ```
            ORIGIN_RELEASE_TAG=v__VERSION__ npx -y origin-mcp
            ```
            Uses isolated port/data-dir defaults so it does not replace the stable runtime.

            **Developer (headless daemon, latest stable):**
            ```
            curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/main/install.sh | bash
            ```

            **Exact shell install for this release:**
            ```
            curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/v__VERSION__/install.sh | ORIGIN_RELEASE_TAG=v__VERSION__ bash
            ```
            Downloads exact binaries and prints manual isolated daemon/MCP setup steps.

            > **First launch** downloads a ~2.7GB AI model. Allow a few minutes on first run.
          projectPath: app
          args: --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CXXFLAGS: "-std=c++17"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload standalone origin-server binary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cp target/aarch64-apple-darwin/release/origin-server origin-server-aarch64-apple-darwin
          gh release upload "$TAG" \
            origin-server-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-mcp binary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cp tmp-mcp/bin/origin-mcp origin-mcp-aarch64-apple-darwin
          gh release upload "$TAG" \
            origin-mcp-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish origin-mcp to npm
        run: npm publish --access public
        working-directory: packages/origin-mcp-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish crates.io (origin-types)
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Check if origin-types changed since last tag
        id: check-changed
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found; publishing origin-types for the first time."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- crates/origin-types/)
            if [ -n "$CHANGED" ]; then
              echo "origin-types changed since $PREV_TAG:"
              echo "$CHANGED"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "origin-types unchanged since $PREV_TAG; skipping publish."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish origin-types to crates.io
        if: steps.check-changed.outputs.changed == 'true'
        run: cargo publish -p origin-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
